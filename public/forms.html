<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms Helper</title>
</head>
<body>
    <!-- This file is used by Netlify to detect the form in a React/Vite app -->
    <!-- Netlify parses this form at build time to register the form for submissions -->
    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
        <input type="text" name="name" required />
        <input type="email" name="email" required />
        <input type="tel" name="phone" />
        <input type="text" name="organization" />
        <select name="subject" required>
            <option value="acquisition">Acquisition</option>
            <option value="support">Support</option>
            <option value="partnership">Partnership</option>
            <option value="investment">Investment</option>
            <option value="general">General</option>
        </select>
        <textarea name="message" required></textarea>
        <input type="hidden" name="form-name" value="contact" />
        <input type="hidden" name="bot-field" />
    </form>
</body>
</html>
